kind = "web"
previewPath = "/"
title = "RISECARE Health Kiosk"
version = "1.0.0"
id = "artifacts/risecare-kiosk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20466
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/risecare-kiosk run dev"

[services.env]
PORT = "20466"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/risecare-kiosk", "run", "build"]
publicDir = "artifacts/risecare-kiosk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
